<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Hand CAPTCHA 실험</title>

<script src="https://unpkg.com/@mediapipe/hands@0.4/hands.js"></script>
<script src="https://unpkg.com/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>
body{margin:0;background:#111;color:#fff;font-family:sans-serif}
.container{display:flex;height:100vh}
.panel{flex:1;position:relative}
video,canvas{position:absolute;width:100%;height:100%;object-fit:cover}
.info{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.5);padding:6px 10px;border-radius:6px}
</style>
</head>

<body>

<div class="container">
    <div class="panel">
        <div class="info" id="infoText">로딩중...</div>
        <video id="refVideo" muted></video>
        <canvas id="refCanvas"></canvas>
    </div>
    <div class="panel">
        <video id="cam" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
// ===== 실험 순서 =====
let order = Math.random() < 0.5 ? ['A','B'] : ['B','A'];
let trialIndex = 0;

// ===== 상태 =====
let keyframes = [];
let kfIdx = 0;
let phase = 'matching';
let matchStart = 0;

// ===== 로그 =====
let log = {
    order,
    trials: [
        { mode: order[0], matches: [], timestamps: [], frames: [] },
        { mode: order[1], matches: [], timestamps: [], frames: [] }
    ]
};

// ===== 설정 =====
const VIDEO_BASE = './';
const ACTIONS = ['l1','l2','l3','r1','r2','r3'];

// ===== DOM =====
const rv = document.getElementById('refVideo');
const rc = document.getElementById('refCanvas');
const rctx = rc.getContext('2d');

const cam = document.getElementById('cam');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ===== 현재 모드 =====
function currentMode(){
    return order[trialIndex];
}

// ===== 시퀀스 =====
function genSequence(){
    const sel = ACTIONS.sort(()=>Math.random()-0.5).slice(0,2);
    keyframes = [];
    sel.forEach(a=>{
        keyframes.push({action:a, time:0});
        keyframes.push({action:a, time:0.5});
        keyframes.push({action:a, time:1});
    });
}

// ===== 키프레임 =====
function showKeyframe(){
    if(kfIdx >= keyframes.length){
        finish();
        return;
    }

    const kf = keyframes[kfIdx];

    document.getElementById('infoText').innerText =
        `Mode:${currentMode()} | ${kfIdx+1}/${keyframes.length}`;

    rv.src = VIDEO_BASE + kf.action + '_level3_DIP.mp4';

    rv.onloadedmetadata = ()=>{
        rv.currentTime = kf.time;

        if(currentMode()==='A'){
            rv.pause();
        }else{
            rv.pause();
            drawFrame();
        }
    };
}

// ===== 프레임 =====
function drawFrame(){
    rc.width = rv.videoWidth;
    rc.height = rv.videoHeight;
    rctx.drawImage(rv,0,0);
}

// ===== 다음 =====
function next(){
    log.trials[trialIndex].matches.push(kfIdx);
    log.trials[trialIndex].timestamps.push(performance.now());

    if(currentMode()==='A'){
        playSegment();
    }else{
        kfIdx++;
        showKeyframe();
    }
}

// ===== 방안 A =====
function playSegment(){
    phase='playing';

    const nextKF = keyframes[kfIdx+1];
    if(!nextKF){
        finish();
        return;
    }

    rv.currentTime = keyframes[kfIdx].time;
    rv.play();

    const stopTime = nextKF.time;

    const loop=()=>{
        if(rv.currentTime>=stopTime){
            rv.pause();
            kfIdx++;
            phase='matching';
            showKeyframe();
        }else requestAnimationFrame(loop);
    };
    loop();
}

// ===== 종료 =====
function finish(){
    if(trialIndex === 0){
        trialIndex++;

        alert(`다음 실험 시작 (${currentMode()})`);

        kfIdx=0;
        phase='matching';
        matchStart=0;

        genSequence();
        showKeyframe();
        return;
    }

    finalFinish();
}

// ===== 최종 종료 =====
function finalFinish(){
    phase='done';

    const dataStr = JSON.stringify(log, null, 2);
    const blob = new Blob([dataStr], {type: "application/json"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = `result_${Date.now()}.json`;
    a.click();

    document.body.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#111;color:#fff;text-align:center;">
        <h2>실험 완료</h2>
        <p>설문에 응답해주세요</p>
        <a href="https://forms.gle/ji8KMSwBzbxXzTUv6" target="_blank"
        style="margin-top:20px;padding:14px 28px;background:#2563eb;color:#fff;border-radius:10px;text-decoration:none;">
        SUS 설문 참여
        </a>
    </div>
    `;
}

// ===== MediaPipe =====
const hands = new Hands({
    locateFile: f=>`https://unpkg.com/@mediapipe/hands@0.4/${f}`
});

hands.setOptions({
    maxNumHands:1,
    minDetectionConfidence:0.5,
    minTrackingConfidence:0.5
});

hands.onResults(res=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(res.multiHandLandmarks){
        const lm = res.multiHandLandmarks[0];

        drawConnectors(ctx, lm, HAND_CONNECTIONS);
        drawLandmarks(ctx, lm);

        // 저장
        log.trials[trialIndex].frames.push({
            t: performance.now(),
            kfIndex: kfIdx,
            phase: phase,
            landmarks: lm.map(p => [p.x,p.y,p.z])
        });

        if(phase==='matching'){
            if(matchStart===0) matchStart=performance.now();

            const held = performance.now()-matchStart;

            if(held>500){
                matchStart=0;
                next();
            }
        }
    }
});

// ===== 카메라 =====
async function initCam(){
    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    cam.srcObject = stream;

    canvas.width=640;
    canvas.height=480;

    async function loop(){
        await hands.send({image:cam});
        requestAnimationFrame(loop);
    }
    loop();
}

// ===== 실행 =====
genSequence();
showKeyframe();
initCam();

</script>
</body>
</html>
